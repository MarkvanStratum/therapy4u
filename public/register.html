<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Begin Pilgrimage — Heaven's Voices</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-heaven: #fdfcfb;
      --marble: #ffffff;
      --gold-divine: #c5a059;
      --blue-saint: #2c3e50;
      --text-main: #33302c;
      --text-muted: #8a8276;
      --border-holy: rgba(197, 160, 89, 0.25);
      --radius: 12px;
      --divine-shadow: 0 15px 50px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; color: var(--text-main); background-color: var(--bg-heaven);
      background-image: radial-gradient(circle at 50% 0%, rgba(197, 160, 89, 0.12), transparent 40%);
      font-family: "EB Garamond", serif; font-size: 18px; line-height: 1.6;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      padding: 20px;
    }

    .container { width: 100%; max-width: 480px; }

    .brand { text-align: center; margin-bottom: 30px; }
    .logo { width: 60px; height: 60px; background: white; border: 1.5px solid var(--gold-divine); border-radius: 50%; display: grid; place-items: center; font-family: "Cinzel", serif; color: var(--gold-divine); font-size: 26px; margin: 0 auto 15px; box-shadow: 0 5px 15px rgba(197, 160, 89, 0.1); }
    .brand h1 { font-family: "Cinzel", serif; font-size: 28px; color: var(--blue-saint); margin: 0; letter-spacing: 2px; }
    .brand p { color: var(--gold-divine); font-family: "Cinzel"; font-size: 11px; letter-spacing: 3px; margin-top: 5px; font-weight: 600; text-transform: uppercase; }

    .card { background: var(--marble); border: 1px solid var(--border-holy); border-radius: var(--radius); box-shadow: var(--divine-shadow); padding: 40px; }
    
    .tabs { display: flex; border-bottom: 1px solid var(--border-holy); margin-bottom: 30px; }
    .tab { flex: 1; text-align: center; padding: 12px; font-family: "Cinzel", serif; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
    .tab.active { color: var(--gold-divine); border-bottom: 2px solid var(--gold-divine); font-weight: 600; }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-family: "Cinzel", serif; font-size: 12px; color: var(--blue-saint); margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
    input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #e2ded5; background: #fff; font-family: "EB Garamond", serif; font-size: 17px; transition: 0.3s; }
    input:focus { outline: none; border-color: var(--gold-divine); box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.1); }

    .btn { width: 100%; padding: 16px; border-radius: 8px; font-family: "Cinzel", serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; border: none; margin-top: 10px; }
    .btn-primary { background: var(--gold-divine); color: white; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3); }
    .btn-primary:hover { background: #b08e4a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(197, 160, 89, 0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .msg { padding: 12px; border-radius: 6px; font-size: 15px; margin-bottom: 20px; display: none; text-align: center; }
    .msg-error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; display: block; }
    .msg-ok { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; display: block; }

    .hide { display: none; }
    
    .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-right: 10px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="container">
    <div class="brand">
      <div class="logo">†</div>
      <h1>Heaven's Voices</h1>
      <p>Secure Portal</p>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" id="tabRegister">New Account</div>
        <div class="tab" id="tabLogin">Sign In</div>
      </div>

      <div id="msgBox" class="msg"></div>

      <div id="registerPane">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="e.g. seeker@example.com" />
        </div>
        <div class="field">
          <label>Choose Password</label>
          <input type="password" id="regPassword" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" id="registerBtn">Begin Pilgrimage</button>
      </div>

      <div id="loginPane" class="hide">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="e.g. seeker@example.com" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" id="loginBtn">Enter Sanctuary</button>
      </div>

    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // Tab Switching
    $("tabRegister").onclick = () => {
      $("tabRegister").classList.add("active");
      $("tabLogin").classList.remove("active");
      $("registerPane").classList.remove("hide");
      $("loginPane").classList.add("hide");
      clearMsg();
    };

    $("tabLogin").onclick = () => {
      $("tabLogin").classList.add("active");
      $("tabRegister").classList.remove("active");
      $("loginPane").classList.remove("hide");
      $("registerPane").classList.add("hide");
      clearMsg();
    };

    function showMsg(type, text) {
      const box = $("msgBox");
      box.className = "msg msg-" + type;
      box.innerText = text;
    }

    function clearMsg() {
      $("msgBox").className = "msg";
      $("msgBox").innerText = "";
    }

    function setToken(t) { localStorage.setItem("jwt", t); }

    function setBusy(isBusy) {
      const activeBtn = $("registerPane").classList.contains("hide") ? $("loginBtn") : $("registerBtn");
      if (isBusy) {
        activeBtn.disabled = true;
        activeBtn.innerHTML = '<span class="loading-spinner"></span> Please wait...';
      } else {
        activeBtn.disabled = false;
        activeBtn.innerText = activeBtn.id === "registerBtn" ? "Begin Pilgrimage" : "Enter Sanctuary";
      }
    }

    // REGISTRATION
    $("registerBtn").onclick = async () => {
      clearMsg();
      const email = $("regEmail").value.trim();
      const password = $("regPassword").value;

      if (!email || !password) {
        showMsg("error", "Please provide both email and password.");
        return;
      }

      setBusy(true);
      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showMsg("error", data.error || "A soul with this email may already be registered.");
          setBusy(false);
          return;
        }

        // 1) Success -> Now Login to get the token immediately
        const loginRes = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const loginData = await loginRes.json();
        
        // 2) Save token
        setToken(loginData.token);
        showMsg("ok", "Blessings. Entering the sanctuary...");

        // 3) Redirect to pricing
        setTimeout(() => {
          window.location.href = "/pricing.html";
        }, 650);

      } catch (err) {
        console.error(err);
        showMsg("error", "Server error. Please try again.");
      } finally {
        setBusy(false);
      }
    };

    // LOGIN + REDIRECT
    $("loginBtn").onclick = async () => {
      clearMsg();
      const email = $("loginEmail").value.trim();
      const password = $("loginPassword").value;

      if (!email || !password) {
        showMsg("error", "Email and password are required.");
        return;
      }

      setBusy(true);
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.token) {
          showMsg("error", data.error || "Invalid credentials.");
          setBusy(false);
          return;
        }

        setToken(data.token);
        showMsg("ok", "Welcome back. Redirecting...");

        setTimeout(() => {
          window.location.href = "/";
        }, 650);

      } catch (err) {
        showMsg("error", "Connection lost. Please try again.");
      } finally {
        setBusy(false);
      }
    };
  </script>
</body>
</html>
