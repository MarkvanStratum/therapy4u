<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Therapy4U — Secure Consultation Checkout</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4a7c72; /* Calm Sage */
            --primary-hover: #3d665e;
            --bg-main: #f8faf9;
            --text-dark: #2c3e3a;
            --text-muted: #6b7c78;
            --border-light: #e0e7e5;
        }

        body { 
            background: var(--bg-main); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: var(--text-dark);
        }

        .checkout-box { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 450px; 
            border: 1px solid var(--border-light); 
        }

        .logo-area { 
            text-align: center; 
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            margin: 0 0 10px; 
            font-size: 28px; 
            color: var(--primary); 
        }

        p { 
            color: var(--text-muted); 
            font-size: 15px; 
            margin-bottom: 30px;
            line-height: 1.5;
        }

        #payment-element { 
            margin-bottom: 24px; 
        }

        #submit { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s;
        }

        #submit:hover { 
            background: var(--primary-hover); 
        }

        #submit:active {
            transform: scale(0.98);
        }

        #submit:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
        }

        #error-message { 
            color: #d9534f; 
            margin-top: 15px; 
            font-size: 14px; 
            text-align: center;
            min-height: 20px;
        }

        .secure-footer {
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="checkout-box">
        <div class="logo-area">
            <div class="logo-icon">T4U</div>
            <h2>Secure Checkout</h2>
            <p>Your session details are encrypted and handled securely via Stripe.</p>
        </div>

        <form id="payment-form">
            <div id="payment-element">
                </div>
            <button id="submit">
                <span id="button-text">Confirm & Start Session</span>
            </button>
            <div id="error-message"></div>
        </form>

        <div class="secure-footer">
            <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            SSL Secure & Encrypted
        </div>
    </div>

    <script>
        const stripe = Stripe("pk_live_51P6FInJm92f7V9hY9WfH9N8R7v6p8L5k4j3h2g1f0e9d8c7b6a5Z4Y3X2W1V0U"); // Keep your actual key here
        let elements;

        async function initialize() {
            const urlParams = new URLSearchParams(window.location.search);
            const plan = urlParams.get('plan');
            const token = localStorage.getItem("jwt");

            if (!token) {
                window.location.href = "/";
                return;
            }

            const response = await fetch("/api/create-payment-intent", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token 
                },
                body: JSON.stringify({ plan }),
            });
            
            const data = await response.json();
            if (data.error) {
                document.getElementById('error-message').innerText = data.error;
                return;
            }

            const { clientSecret } = data;
            elements = stripe.elements({ clientSecret });
            const paymentElement = elements.create("payment");
            paymentElement.mount("#payment-element");
        }

        document.querySelector("#payment-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const submitBtn = document.querySelector("#submit");
            submitBtn.disabled = true;

            const { error } = await stripe.confirmPayment({
                elements,
                confirmParams: {
                    return_url: window.location.origin + "/?payment=success",
                },
            });

            if (error) {
                document.querySelector("#error-message").textContent = error.message;
                submitBtn.disabled = false;
            }
        });

        initialize();
    </script>
</body>
</html>
